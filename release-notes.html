<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- アイコン設定 -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍻</text></svg>">
    <title>リリースノート - わりっぱ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="common.css">
    <style>
        /* Markdownで生成されるHTML用のスタイリング */
        .release-content h1, .release-content h2, .release-content h3 { font-weight: bold; margin-top: 1.5rem; margin-bottom: 0.5rem; color: #1f2937; }
        .release-content h1 { font-size: 1.5rem; border-bottom: 2px solid #fdba74; padding-bottom: 0.25rem; }
        .release-content h2 { font-size: 1.25rem; }
        .release-content ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; color: #4b5563; }
        .release-content li { margin-bottom: 0.25rem; }
        .release-content p { margin-bottom: 1rem; color: #4b5563; line-height: 1.6; }
        .release-content a { color: #f97316; text-decoration: underline; }
        .release-content code { background-color: #ffedd5; color: #9a3412; padding: 0.125rem 0.25rem; border-radius: 0.25rem; font-size: 0.875em; }
    </style>
</head>
<body>

    <main class="container mx-auto px-4 py-12 max-w-3xl">
        <section>
            <div class="text-center mb-10">
                <span class="inline-block bg-orange-100 text-orange-800 text-sm px-3 py-1 rounded-full font-bold uppercase tracking-wider mb-3">Updates</span>
                <h1 class="text-4xl font-pop text-gray-800">リリースノート</h1>
            </div>

            <div id="release-notes-container" class="space-y-8">
                <!-- Release notes will be loaded here -->
            </div>
             <!-- Loading Indicator -->
            <div id="loadingIndicator" class="text-center py-16">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-orange-500"></div>
                <p class="mt-4 text-gray-500 font-medium">情報を取得しています...</p>
            </div>
        </section>
    </main>

    <script type="module">
        import { initCommonUI } from './common.js';

        document.addEventListener('DOMContentLoaded', () => {
            initCommonUI("2.1.0");

            const GITHUB_USER = 'qcda-dev';
            const GITHUB_REPO = 'Walippa'; 

            const container = document.getElementById('release-notes-container');
            const loadingIndicator = document.getElementById('loadingIndicator');
            const apiUrl = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/releases`;

            fetch(apiUrl)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Network response was not ok: ${response.statusText}`);
                    }
                    return response.json();
                })
                .then(releases => {
                    loadingIndicator.classList.add('hidden');
                    if (releases.length === 0) {
                        container.innerHTML = '<div class="card text-center text-gray-500 py-10">リリース情報はまだありません。</div>';
                        return;
                    }

                    releases.forEach(release => {
                        const releaseDate = new Date(release.published_at).toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric' });
                        
                        const releaseElement = document.createElement('div');
                        releaseElement.className = 'card relative overflow-hidden';
                        
                        // バージョンバッジの装飾
                        const badge = document.createElement('div');
                        badge.className = 'absolute top-0 right-0 bg-orange-500 text-white text-xs font-bold px-3 py-1 rounded-bl-lg';
                        badge.textContent = release.tag_name;
                        
                        const releaseBodyHtml = marked.parse(release.body);

                        releaseElement.innerHTML = `
                            ${badge.outerHTML}
                            <div class="mb-4 pb-4 border-b border-gray-100 pr-16">
                                <h2 class="text-2xl font-bold text-gray-800 mb-1">${release.name || release.tag_name}</h2>
                                <span class="text-sm text-gray-400 flex items-center">
                                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                    ${releaseDate}
                                </span>
                            </div>
                            <div class="release-content text-gray-700">${releaseBodyHtml}</div>
                        `;
                        container.appendChild(releaseElement);
                    });
                })
                .catch(error => {
                    loadingIndicator.classList.add('hidden');
                    console.error('Error fetching release notes:', error);
                    container.innerHTML = `
                        <div class="bg-red-50 border border-red-200 text-red-600 rounded-xl p-6 text-center shadow-sm">
                            <svg class="w-12 h-12 mx-auto mb-3 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            <p class="font-bold mb-1">情報の取得に失敗しました</p>
                            <p class="text-sm">時間を置いて再度お試しください。</p>
                        </div>`;
                });
        });
    </script>
</body>
</html>
